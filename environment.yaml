# =============================================================================
# ionization - Conda Environment
# =============================================================================
# Crea el entorno completo con un solo comando:
#
#   conda env create -f environment.yaml
#   conda activate ionization_env
#
# Para actualizar si cambian dependencias:
#   conda env update -f environment.yaml
# =============================================================================

name: ionization_env
channels:
  - conda-forge
  - defaults

dependencies:
  # --- Python ---
  - python=3.10

  # --- Chemistry (mejor via conda) ---
  - rdkit

  # --- Core Python packages ---
  - pandas>=1.5
  - numpy>=1.23
  - openpyxl>=3.1
  - pyyaml>=6.0

  # --- Dev/Testing ---
  - pytest>=7.0

  # --- pip-only packages ---
  - pip
  - pip:
      - dimorphite_dl
