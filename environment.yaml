# =============================================================================
# ionprofile - Conda Environment (Server + GPU)
# =============================================================================
# Instalar/actualizar:
#   conda env update -f environment.yaml
#   conda activate ionization_env
#   pip install -e .
# =============================================================================

name: ionization_env
channels:
  - conda-forge
  - defaults

dependencies:
  # --- Python ---
  - python=3.10

  # --- Chemistry ---
  - rdkit
  - openbabel
  - xtb

  # --- Core ---
  - pandas>=1.5
  - numpy>=1.23
  - openpyxl>=3.1
  - pyyaml>=6.0

  # --- Dev/Testing ---
  - pytest>=7.0

  # --- pip-only packages ---
  - pip
  - pip:
      - dimorphite_dl
      - qupkake